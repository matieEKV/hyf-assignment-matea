<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="styles.css" />
    <!-- google fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto+Mono:ital,wght@0,100..700;1,100..700&display=swap"
      rel="stylesheet"
    />
    <title>Currency Converter</title>
  </head>
  <body>
    <main>
      <div class="error-box hidden"><strong>System error: </strong><span class="error-message"></span></div>
      <h1 class="heading">CURRENCY CONVERTER</h1>
      <div class="converter-container">
        <div class="input-bar-container">
          <label for="source-input">Amount</label>
          <div class="input-bar">
            <input
              class="input-amount amount"
              id="source-input"
              type="number"
              value="1"
              maxlength="8"
            />
            <fieldset>
                <div class="flag" id="start-flag">Fl</div>
              <select class="starting-currency currency" name="currency" min="0"></select>
            </fieldset>
          </div>
        </div>
        <button class="swap-button" aria-label="Swap-currencies">
         <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <path d="M9 7L5 3L1 7" />
  <path d="M11 21H9a4 4 0 0 1-4-4V3" />
  
  <path d="M15 17L19 21L23 17" />
  <path d="M13 3h2a4 4 0 0 1 4 4v14" />
</svg>
</button>
          <div class="input-bar-container">
            <label for="source-input">Converted to</label>
            <div class="input-bar">
              <p class="output-amount amount"></p>
              <fieldset>
                <div class="flag" id="end-flag">Fl</div>
                <select class="ending-currency currency" name="currency"></select>
              </fieldset>
            </div>
          </div>
        </div>
      </div>
    </main>
    <script type="module" src="script.js"></script>
  </body>
</html>
