<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Working with Movies</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main>
      <h1>Working with Movies - Advanced JavaScript 1</h1>
      <div class="outside-container">
        <div class="cards-container">
          <button class="card" data-action="short">Short Title Movies</button>
          <button class="card" data-action="long">Long Title Movies</button>
          <button class="card" data-action="eighties">1980s Movies</button>
          <button class="card" data-action="tagged">Tagged Movies</button>
          <button class="card" data-action="better">Movies rated over 6</button>
          <button class="card" data-action="keyword">
            Keyword counted Movies
          </button>
          <button class="card" data-action="duplicated">
            Duplicated-word Titles
          </button>
          <button class="card" data-action="average">
            Average rating of all Movies
          </button>
          <button class="card" data-action="counts">
            Good/Average/Bad Counts
          </button>
        </div>
        <div class="output">
          <ul class="list"></ul>
        </div>
      </div>
    </main>
    <script type="module" src="script.js"></script>
  </body>
</html>
